server:
  port: 8762

spring:
  application:
    name: discovery-server
  config:
    activate:
      on-profile: server-02

eureka:
  client:
    fetchRegistry: false
    registerWithEureka: false
    serviceUrl:
      defaultZone: http://server-01.com:8762/eureka/, http://server-03.com:8763/eureka/
  datacenter: "Robinzon"
  environment: "Development"
  instance:
    hostname: localhost
    preferIpAddress: false
    lease-expiration-duration-in-seconds: 30